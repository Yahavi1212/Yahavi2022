<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- SEO Meta Tags -->
    <title>Hackknow - Premium Digital Products Marketplace</title>
    <meta name="description" content="Buy and sell premium digital products including templates, dashboards, spreadsheets, presentation decks, and more. India's leading digital marketplace." />
    <meta name="keywords" content="digital products, templates, dashboards, spreadsheets, powerpoint, excel, marketing templates, digital assets" />
    <meta name="author" content="Hackknow" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hackknow.com" />
    <meta property="og:title" content="Hackknow - Premium Digital Products Marketplace" />
    <meta property="og:description" content="Buy and sell premium digital products including templates, dashboards, spreadsheets, and more." />
    <meta property="og:image" content="https://hackknow.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hackknow.com" />
    <meta property="twitter:title" content="Hackknow - Premium Digital Products Marketplace" />
    <meta property="twitter:description" content="Buy and sell premium digital products including templates, dashboards, spreadsheets, and more." />
    <meta property="twitter:image" content="https://hackknow.com/og-image.jpg" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://hackknow.com" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />

    <!-- Preconnect for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://shop.hackknow.com" />
    <link rel="preconnect" href="https://checkout.razorpay.com" />

    <!-- Preload Critical Fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" as="style" />

    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://shop.hackknow.com" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#FFF055" />
    <meta name="msapplication-TileColor" content="#1A1A1A" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
