# NGINX Configuration for Hackknow
# Reverse-proxies hackknow.com to GCE static build + shop.hackknow.com WP backend
# Hides shop.hackknow.com from end users while serving WPGraphQL, REST, media,
# and the deploy webhook through a single hostname.

upstream hackknow_wp {
    server shop.hackknow.com:443;
    keepalive 16;
}

upstream hackknow_deploy {
    server 127.0.0.1:9000;
    keepalive 4;
}

# Gzip Compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/woff2
    font/woff
    font/ttf;
gzip_min_length 1000;

# Rate-limit checkout/auth endpoints
limit_req_zone $binary_remote_addr zone=hackknow_checkout:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=hackknow_auth:10m rate=10r/m;

# HTTPS/SSL Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hackknow.com www.hackknow.com;

    root /var/www/hackknow/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/hackknow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hackknow.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com https://*.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://api.razorpay.com https://*.razorpay.com; frame-src https://api.razorpay.com https://*.razorpay.com;" always;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, must-revalidate, max-age=60" always;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary "Accept-Encoding" always;
        access_log off;
        try_files $uri =404;
    }

    # Fonts (CORS for cross-origin loaders)
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Vary "Accept-Encoding" always;
        access_log off;
    }

    # WordPress media (uploaded product images, etc.) – proxied so URLs stay on hackknow.com
    location /wp-content/ {
        proxy_pass https://hackknow_wp;
        proxy_ssl_server_name on;
        proxy_set_header Host shop.hackknow.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Checkout REST – rate-limited
    location ~ ^/wp-json/hackknow/ {
        limit_req zone=hackknow_checkout burst=10 nodelay;
        proxy_pass https://hackknow_wp;
        proxy_ssl_server_name on;
        proxy_set_header Host shop.hackknow.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # JWT auth endpoints – rate-limited
    location ~ ^/(graphql|wp-json/jwt-auth) {
        limit_req zone=hackknow_auth burst=5 nodelay;
        proxy_pass https://hackknow_wp;
        proxy_ssl_server_name on;
        proxy_set_header Host shop.hackknow.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Generic WordPress REST passthrough (read-only catalog, etc.)
    location ~ ^/(api|wp-json) {
        proxy_pass https://hackknow_wp;
        proxy_ssl_server_name on;
        proxy_set_header Host shop.hackknow.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Deploy webhook – proxied to localhost service so port 9000 stays internal
    location /wp-deploy/ {
        proxy_pass http://hackknow_deploy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/hackknow/dist;
    }
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hackknow.com www.hackknow.com;
    return 301 https://$server_name$request_uri;
}
