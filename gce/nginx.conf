# NGINX Configuration for Hackknow - Optimized for Google PageSpeed
# Designed for GCE Free Tier (e2-micro) with maximum performance

# Gzip Compression - Essential for PageSpeed
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    font/woff2
    font/woff
    font/ttf;
gzip_min_length 1000;

# HTTPS/SSL Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hackknow.com www.hackknow.com;

    root /var/www/hackknow/dist;
    index index.html;

    # SSL Configuration (Certbot will handle these paths)
    ssl_certificate /etc/letsencrypt/live/hackknow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hackknow.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security Headers - Required for security score
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Main location block - SPA routing support
    location / {
        try_files $uri $uri/ /index.html;

        # Cache HTML for short time (for SPAs)
        add_header Cache-Control "public, must-revalidate, max-age=60" always;
    }

    # Static Assets - Aggressive caching for PageSpeed
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary "Accept-Encoding" always;
        access_log off;

        # Handle 404s gracefully
        try_files $uri =404;
    }

    # Fonts - Long cache with CORS for Google Fonts compatibility
    location ~* \.(woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Vary "Accept-Encoding" always;
        access_log off;
    }

    # API/GraphQL - No caching for dynamic content
    location ~ ^/(api|graphql|wp-json) {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_pass https://shop.hackknow.com;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint for GCE load balancer
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/hackknow/dist;
    }
}

# HTTP Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name hackknow.com www.hackknow.com;
    return 301 https://$server_name$request_uri;
}
